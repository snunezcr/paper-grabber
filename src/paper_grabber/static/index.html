<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="/manifest.webmanifest">
<title>Research Stream</title>
<style>
  /* Sized for a Tab S10 in either orientation. Touch targets are 48px
     minimum; primary actions sit at the bottom of a card or pinned to the
     bottom of the viewport, under the thumb rather than above a long
     abstract. */
  :root {
    --bg: #fbfbfa; --card: #fff; --ink: #1a1a1a; --muted: #6b6b6b;
    --line: #e4e4e1; --accept: #1a7f4b; --reject: #a33; --accent: #2b5fd9;
    --sheet: #fff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181a; --card: #202225; --ink: #eceff1; --muted: #9aa0a6;
      --line: #303338; --accept: #4ec27f; --reject: #e2726e; --accent: #7aa2f7;
      --sheet: #202225;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  header {
    position: sticky; top: 0; z-index: 5; background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: calc(.6rem + env(safe-area-inset-top)) 1rem .3rem;
  }
  .titlebar { display: flex; align-items: center; gap: .75rem; }
  #check {
    margin-left: auto; min-height: 40px; padding: 0 .9rem; cursor: pointer;
    display: inline-flex; align-items: center; gap: .45rem; white-space: nowrap;
    border: 1px solid var(--accent); border-radius: 8px;
    background: none; color: var(--accent); font-size: .88rem; font-weight: 600;
  }
  #check[disabled] { opacity: .55; cursor: default; }
  #check .spin {
    width: 13px; height: 13px; border-radius: 50%; display: inline-block;
    border: 2px solid currentColor; border-top-color: transparent;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { #check .spin { animation: none; } }
  .titlebar h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
  #counts { color: var(--muted); font-size: .85rem; font-variant-numeric: tabular-nums; }
  #authbar {
    display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
    margin-top: .45rem; font-size: .87rem; color: var(--muted);
  }
  #authbar a#signin {
    display: inline-flex; align-items: center; min-height: 40px; padding: 0 .9rem;
    border: 1px solid var(--accent); border-radius: 8px; color: var(--accent);
    text-decoration: none; font-weight: 600;
  }
  #authbar.ok a#signin { display: none; }
  #authbar.warn #authmsg { color: var(--reject); }
  nav { display: flex; gap: .25rem; margin-top: .5rem; }
  nav button {
    flex: 1; min-height: 44px; background: none; border: 0; cursor: pointer;
    color: var(--muted); font-size: .95rem; font-weight: 600;
    border-bottom: 2px solid transparent;
  }
  nav button[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--accent); }
  nav button .badge {
    display: inline-block; min-width: 1.4em; padding: 0 .35em; margin-left: .3em;
    border-radius: 999px; background: var(--line); color: var(--ink);
    font-size: .78rem; font-variant-numeric: tabular-nums;
  }

  main { max-width: 46rem; margin: 0 auto; padding: 1rem 1rem 7rem; }

  #alertfilter {
    display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1rem;
  }
  #alertfilter button {
    min-height: 40px; padding: 0 .75rem; cursor: pointer;
    border: 1px solid var(--line); border-radius: 999px;
    background: var(--card); color: var(--muted);
    font-size: .85rem; font-weight: 600; white-space: nowrap;
  }
  #alertfilter button[aria-pressed="true"] {
    border-color: var(--accent); color: var(--accent);
  }
  #alertfilter button .n {
    margin-left: .4rem; font-variant-numeric: tabular-nums; opacity: .8;
  }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 1rem; margin-bottom: 1rem;
  }
  .card.going { opacity: .35; transform: scale(.99); transition: opacity .18s, transform .18s; }
  .title { font-size: 1.08rem; font-weight: 600; margin: 0 0 .35rem; line-height: 1.35; }
  .meta { color: var(--muted); font-size: .87rem; margin-bottom: .6rem; }
  .abstract { font-size: .94rem; margin: 0 0 .5rem; }
  .abstract.clamped { display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
  .more { background: none; border: 0; color: var(--accent); padding: .25rem 0; font-size: .88rem; cursor: pointer; min-height: 32px; }
  .tags { display: flex; flex-wrap: wrap; gap: .4rem; margin: .6rem 0 .9rem; }
  .tag { font-size: .74rem; padding: .18rem .5rem; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .tag.pdf { color: var(--accept); border-color: currentColor; }
  .tag.snippet { font-style: italic; }
  .tag.dest { color: var(--accent); border-color: currentColor; }

  .actions { display: flex; gap: .6rem; }
  .actions button {
    flex: 1; min-height: 48px; border-radius: 10px; font-size: .95rem;
    font-weight: 600; cursor: pointer; border: 1px solid var(--line);
    background: var(--card); color: var(--ink);
  }
  .actions .yes { border-color: var(--accept); color: var(--accept); }
  .actions .no  { border-color: var(--reject); color: var(--reject); }
  .actions a.open {
    flex: 0 0 auto; min-height: 48px; display: flex; align-items: center;
    padding: 0 .9rem; border: 1px solid var(--line); border-radius: 10px;
    color: var(--accent); text-decoration: none; font-size: .9rem;
  }

  /* filing list */
  .pick { display: flex; gap: .75rem; align-items: flex-start; }
  .pick input[type=checkbox] { width: 24px; height: 24px; margin-top: .2rem; flex: 0 0 auto; }
  .filing-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin-bottom: .9rem; flex-wrap: wrap;
  }
  .basefolder { color: var(--muted); font-size: .9rem; }
  .linkbtn { background: none; border: 0; color: var(--accent); cursor: pointer; font-size: .9rem; min-height: 44px; padding: 0 .25rem; }
  .filed-actions { margin-top: .5rem; }
  .filed-actions button { min-height: 44px; font-size: .9rem; }
  .filed-actions .up { border-color: var(--accept); color: var(--accept); }
  .filed-actions .verify { flex: 0 0 auto; padding: 0 .9rem; }
  .filed-actions .cardstatus {
    display: inline-flex; align-items: center; font-size: .85rem;
    color: var(--muted); padding-left: .3rem;
  }
  .filed-actions .cardstatus.bad { color: var(--reject); }
  .filed-actions .done {
    color: var(--accept); font-size: .85rem; font-weight: 600;
    display: inline-flex; align-items: center; min-height: 44px;
  }
  .section-label { font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 1.5rem 0 .6rem; }

  #filebar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 6;
    background: var(--card); border-top: 1px solid var(--line);
    padding: .7rem 1rem calc(.7rem + env(safe-area-inset-bottom));
    display: flex; gap: .6rem; align-items: center;
  }
  #filebar .count { flex: 1; font-size: .9rem; color: var(--muted); }
  #filebar button {
    min-height: 48px; padding: 0 1.1rem; border-radius: 10px; font-weight: 600;
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    font-size: .95rem; cursor: pointer;
  }
  #filebar button.ghost { background: none; color: var(--ink); border-color: var(--line); }

  /* folder picker sheet */
  #sheet {
    position: fixed; inset: 0; z-index: 20; background: var(--sheet);
    display: flex; flex-direction: column;
  }
  #sheet header { border-bottom: 1px solid var(--line); }
  #crumbs { display: flex; flex-wrap: wrap; gap: .2rem; align-items: center; font-size: .9rem; padding: .3rem 0 .1rem; }
  #crumbs button { background: none; border: 0; color: var(--accent); cursor: pointer; font-size: .9rem; padding: .35rem .2rem; min-height: 40px; }
  #crumbs span.sep { color: var(--muted); }
  #crumbs .here { color: var(--ink); font-weight: 600; padding: .35rem .2rem; }
  #folders { flex: 1; overflow-y: auto; padding: .5rem 1rem 1rem; }
  .folder {
    display: flex; align-items: center; gap: .7rem; width: 100%;
    min-height: 56px; padding: .5rem .6rem; background: none; cursor: pointer;
    border: 0; border-bottom: 1px solid var(--line); color: var(--ink);
    font-size: 1rem; text-align: left;
  }
  .folder .chev { margin-left: auto; color: var(--muted); }
  #sheetfoot {
    border-top: 1px solid var(--line); display: flex; gap: .6rem;
    padding: .7rem 1rem calc(.7rem + env(safe-area-inset-bottom));
  }
  #sheetfoot button { min-height: 48px; border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer; }
  #sheetfoot .cancel { flex: 0 0 auto; padding: 0 1rem; border: 1px solid var(--line); background: none; color: var(--ink); }
  #sheetfoot .newf { flex: 0 0 auto; padding: 0 1rem; border: 1px solid var(--line); background: none; color: var(--accent); }
  #sheetfoot .confirm { flex: 1; border: 1px solid var(--accent); background: var(--accent); color: #fff; }

  #empty, #error, .note { text-align: center; color: var(--muted); padding: 2.5rem 1rem; }
  #error { color: var(--reject); padding: 1rem; }
  #notice {
    text-align: center; padding: .7rem 1rem; margin-bottom: .5rem;
    color: var(--accept); border: 1px solid currentColor; border-radius: 10px;
    font-size: .9rem;
  }
  #undo {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(1.2rem + env(safe-area-inset-bottom));
    background: var(--ink); color: var(--bg); border: 0; border-radius: 999px;
    padding: .7rem 1.2rem; font-size: .9rem; min-height: 44px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.22); z-index: 7;
  }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<header>
  <div class="titlebar">
    <h1>Research Stream</h1>
    <span id="counts"></span>
    <button id="check" title="Check Gmail for new alerts now">
      <span class="spin" hidden></span><span class="label">Check now</span>
    </button>
  </div>
  <div id="authbar" hidden>
    <span id="authmsg"></span>
    <a id="signin" href="/auth/google/start">Sign in with Google</a>
    <button id="signout" class="linkbtn" hidden>Sign out</button>
  </div>
  <nav>
    <button id="tab-triage" aria-selected="true">Triage<span class="badge" id="badge-triage">0</span></button>
    <button id="tab-filing" aria-selected="false">Filing<span class="badge" id="badge-filing">0</span></button>
    <button id="tab-processed" aria-selected="false">Processed<span class="badge" id="badge-processed">0</span></button>
  </nav>
</header>

<main>
  <div id="error" hidden></div>
  <div id="notice" hidden></div>

  <section id="view-triage">
    <div id="alertfilter" hidden></div>
    <div id="list"></div>
    <div id="empty" hidden>Nothing to triage here. Press Check now, or pick another alert above.</div>
  </section>

  <section id="view-processed" hidden>
    <div id="processed"></div>
    <div id="noprocessed" class="note" hidden>Nothing uploaded yet. Papers you send to Drive appear here.</div>
  </section>

  <section id="view-filing" hidden>
    <div class="filing-head">
      <span class="basefolder" id="basefolder">No base folder set</span>
      <button class="linkbtn" id="setbase">Change base folder</button>
    </div>
    <div id="unfiled"></div>
    <div id="nofiling" class="note" hidden>Nothing accepted yet. Papers you mark interesting appear here.</div>
    <div id="filed-wrap" hidden>
      <div class="section-label">Ready to upload</div>
      <div id="filed"></div>
    </div>
  </section>
</main>

<div id="filebar" hidden>
  <span class="count" id="selcount">0 selected</span>
  <button class="ghost" id="selall">Select all</button>
  <button id="filesel">File to…</button>
</div>

<button id="undo" hidden>Undo</button>

<div id="sheet" hidden>
  <header>
    <div class="titlebar"><h1 id="sheettitle">Choose a folder</h1></div>
    <div id="crumbs"></div>
  </header>
  <div id="folders"></div>
  <div id="sheetfoot">
    <button class="cancel" id="sheetcancel">Cancel</button>
    <button class="newf" id="sheetnew">New folder</button>
    <button class="confirm" id="sheetok">File here</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let state = { tab: 'triage', selected: new Set(), base: null, sheet: null,
              pending: [], filter: null };

// Capabilities this page expects the server to have.
const NEEDS = ['refresh', 'upload', 'unfile', 'drive-browse', 'processed', 'verify', 'scope-check'];

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) {
    let detail = `HTTP ${r.status}`;
    try { detail = (await r.json()).detail || detail; } catch {}
    // A 404 on an endpoint this page knows about means the server predates
    // the page, not that the request was wrong.
    if (r.status === 404 && path.startsWith('/api/')) {
      detail = `${detail} — the server may be running older code; restart it`;
    }
    throw new Error(detail);
  }
  return r.json();
}

async function checkServerVersion() {
  try {
    const v = await api('/api/version');
    const have = new Set(v.capabilities || []);
    const missing = NEEDS.filter(c => !have.has(c));
    if (missing.length) {
      showError(
        `This page needs features the running server does not have ` +
        `(${missing.join(', ')}). Restart it: pkill -f "paper-grabber serve" ` +
        `then paper-grabber serve`
      );
    }
  } catch (e) {
    showError('Server is running older code — restart it to pick up this page.');
  }
}

function showError(msg) {
  const el = $('#error');
  el.textContent = msg;
  el.hidden = false;
  clearTimeout(showError.t);
  showError.t = setTimeout(() => { el.hidden = true; }, 6000);
}

function showCounts(c) {
  $('#counts').textContent =
    `${c.pending || 0} pending · ${c.accepted || 0} accepted · ` +
    `${c.rejected || 0} rejected · ${c.filed || 0} filed · ` +
    `${c.processed || 0} in Drive`;
  $('#badge-triage').textContent = c.pending || 0;
  $('#badge-processed').textContent = c.processed || 0;
}

// ---------- triage ----------

function cardBody(p) {
  const meta = [p.authors.join(', '), p.venue, p.year].filter(Boolean).join(' · ');
  const tags = [];
  if (p.has_pdf) tags.push('<span class="tag pdf">PDF available</span>');
  if (p.abstract_is_snippet) tags.push('<span class="tag snippet">snippet, not abstract</span>');
  if (p.alert_query) tags.push(`<span class="tag">${esc(p.alert_query)}</span>`);
  if (p.dest_folder_name) tags.push(`<span class="tag dest">→ ${esc(p.dest_folder_name)}</span>`);
  return `
    <h2 class="title">${esc(p.title)}</h2>
    <div class="meta">${esc(meta) || '&nbsp;'}</div>
    <p class="abstract clamped">${esc(p.abstract || 'No abstract or snippet available.')}</p>
    <button class="more" hidden>Show more</button>
    <div class="tags">${tags.join('')}</div>`;
}

function wireAbstract(el) {
  const abs = el.querySelector('.abstract'), more = el.querySelector('.more');
  requestAnimationFrame(() => {
    if (abs.scrollHeight > abs.clientHeight + 4) more.hidden = false;
  });
  more.addEventListener('click', () => {
    abs.classList.toggle('clamped');
    more.textContent = abs.classList.contains('clamped') ? 'Show more' : 'Show less';
  });
}

function triageCard(p) {
  const el = document.createElement('article');
  el.className = 'card';
  el.innerHTML = cardBody(p) + `
    <div class="actions">
      <button class="yes">Interesting</button>
      <button class="no">Skip</button>
      ${p.url ? `<a class="open" href="${esc(p.url)}" target="_blank" rel="noopener">Open</a>` : ''}
    </div>`;
  wireAbstract(el);
  el.querySelector('.yes').addEventListener('click', () => decide(el, p, 'accepted'));
  el.querySelector('.no').addEventListener('click', () => decide(el, p, 'rejected'));
  return el;
}

async function decide(el, paper, decision) {
  el.classList.add('going');
  try {
    const data = await api(`/api/papers/${encodeURIComponent(paper.key)}/decision`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({decision})
    });
    showCounts(data.counts);
    state.pending = (state.pending || []).filter(x => x.key !== paper.key);
    setTimeout(() => {
      el.remove();
      $('#empty').hidden = $('#list').children.length > 0;
      // Counts on the chips must follow the list, or the filter lies.
      renderAlertFilter();
    }, 180);
    // Reversing a decision must be one tap: a mis-tap is easy on a tablet, and
    // a rejected paper is suppressed on every future sync -- invisible forever.
    state.lastUndo = paper;
    $('#undo').hidden = false;
    loadFiling();
  } catch (e) {
    el.classList.remove('going');
    showError(`Could not record decision: ${e.message}`);
  }
}

$('#undo').addEventListener('click', async () => {
  const paper = state.lastUndo;
  if (!paper) return;
  try {
    const data = await api(`/api/papers/${encodeURIComponent(paper.key)}/decision`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({decision: 'pending'})
    });
    showCounts(data.counts);
    state.pending = [paper, ...(state.pending || [])];
    $('#empty').hidden = true;
    // Re-render rather than prepend: an undone paper may belong to a filter
    // that is not currently showing.
    renderTriage();
    state.lastUndo = null;
    $('#undo').hidden = true;
    loadFiling();
  } catch (e) { showError(`Could not undo: ${e.message}`); }
});

const NO_ALERT = '(no alert)';

function alertOf(p) {
  return p.alert_query || NO_ALERT;
}

function renderAlertFilter() {
  const wrap = $('#alertfilter');
  const papers = state.pending || [];
  const counts = new Map();
  for (const p of papers) counts.set(alertOf(p), (counts.get(alertOf(p)) || 0) + 1);

  // One alert is not a choice; showing a single chip is just clutter.
  if (counts.size < 2) {
    wrap.hidden = true;
    state.filter = null;
    return;
  }

  // A filter whose papers are all gone would leave an empty list and no way
  // back except finding the All chip.
  if (state.filter && !counts.has(state.filter)) state.filter = null;

  const chips = [['', 'All', papers.length]];
  // Busiest first: the noisy query is the one worth isolating.
  for (const [name, n] of [...counts].sort((a, b) => b[1] - a[1])) {
    chips.push([name, name, n]);
  }

  wrap.replaceChildren(...chips.map(([value, label, n]) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.setAttribute('aria-pressed', String((state.filter || '') === value));
    b.innerHTML = `${esc(label)}<span class="n">${n}</span>`;
    b.addEventListener('click', () => {
      state.filter = value || null;
      renderTriage();
    });
    return b;
  }));
  wrap.hidden = false;
}

function visiblePending() {
  const papers = state.pending || [];
  return state.filter ? papers.filter(p => alertOf(p) === state.filter) : papers;
}

function renderTriage() {
  const shown = visiblePending();
  $('#list').replaceChildren(...shown.map(triageCard));
  $('#empty').hidden = shown.length > 0;
  renderAlertFilter();
}

async function loadTriage() {
  try {
    const data = await api('/api/pending');
    showCounts(data.counts);
    state.pending = data.papers;
    renderTriage();
  } catch (e) { showError(`Could not load papers: ${e.message}`); }
}

// ---------- filing ----------

function filingCard(p, {selectable}) {
  const el = document.createElement('article');
  el.className = 'card';
  el.dataset.key = p.key;
  const inner = document.createElement('div');
  inner.className = 'pick';
  inner.innerHTML = `
    ${selectable ? `<input type="checkbox" aria-label="Select ${esc(p.title)}">` : ''}
    <div style="flex:1">${cardBody(p)}</div>`;
  el.appendChild(inner);
  wireAbstract(el);

  if (selectable) {
    const box = el.querySelector('input');
    box.checked = state.selected.has(p.key);
    box.addEventListener('change', () => {
      box.checked ? state.selected.add(p.key) : state.selected.delete(p.key);
      refreshFileBar();
    });
  } else {
    // A filed paper can be sent to Drive, or put back in the queue if the
    // destination was wrong. Once uploaded neither applies.
    const actions = document.createElement('div');
    actions.className = 'actions filed-actions';
    if (p.uploaded) {
      actions.innerHTML = '<span class="done">In Drive</span>';
    } else {
      actions.innerHTML = `
        <button class="up">Upload</button>
        <button class="unfile">Not yet</button>
        <span class="cardstatus" hidden></span>`;
      actions.querySelector('.up').addEventListener('click', () => uploadOne(p, el));
      actions.querySelector('.unfile').addEventListener('click', () => unfile(p));
    }
    el.querySelector('.pick > div:last-child').appendChild(actions);
  }
  return el;
}

async function unfile(paper) {
  try {
    const data = await api(`/api/papers/${encodeURIComponent(paper.key)}/unfile`, {
      method: 'POST'
    });
    showCounts(data.counts);
    showNotice(`Returned to the queue: ${paper.title.slice(0, 48)}`);
    loadFiling();
  } catch (e) { showError(`Could not unfile: ${e.message}`); }
}

function cardStatus(card, text, {bad = false} = {}) {
  // Shown on the card itself. A message at the top of the page is invisible
  // when you are scrolled down among the cards, which makes a slow upload
  // look like a button that does nothing.
  const el = card.querySelector('.cardstatus');
  if (!el) return;
  el.textContent = text;
  el.hidden = !text;
  el.classList.toggle('bad', bad);
}

async function uploadOne(paper, card) {
  const button = card.querySelector('.up');
  button.disabled = true;
  card.querySelector('.unfile').disabled = true;
  // Say what is actually happening: an unfetched paper downloads first, which
  // is most of the wait.
  cardStatus(card, paper.staged ? 'Uploading…' : 'Downloading, then uploading…');
  state.uploading = paper.key;
  try {
    await api('/api/upload', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({keys: [paper.key]})
    });
    pollUpload();
  } catch (e) {
    button.disabled = false;
    card.querySelector('.unfile').disabled = false;
    cardStatus(card, `Could not start: ${e.message}`, {bad: true});
    state.uploading = null;
  }
}

async function pollUpload() {
  try {
    const s = await api('/api/upload');
    if (s.running) { setTimeout(pollUpload, 1200); return; }

    const r = s.last;
    const failures = (r?.outcomes || []).filter(o => !o.ok);
    state.lastUploadFailures = Object.fromEntries(
      failures.map(o => [o.key, o.detail])
    );
    state.uploading = null;

    if (r?.error) showError(r.error);
    for (const o of (r?.outcomes || [])) {
      if (o.ok) showNotice(`${o.detail}${o.folder ? ` → ${o.folder}` : ''}: ${o.title.slice(0, 40)}`);
    }
    // Re-render, then paint any failure onto the card it belongs to so the
    // reason survives the refresh.
    await loadFiling();
    loadProcessed();
    paintUploadFailures();
  } catch (e) {
    state.uploading = null;
    showError(`Could not read upload status: ${e.message}`);
    loadFiling();
  }
}

function paintUploadFailures() {
  const failures = state.lastUploadFailures || {};
  for (const card of $('#filed').children) {
    const detail = failures[card.dataset.key];
    if (detail) cardStatus(card, detail, {bad: true});
  }
}

function refreshFileBar() {
  const n = state.selected.size;
  $('#selcount').textContent = `${n} selected`;
  $('#filesel').disabled = n === 0;
  $('#filebar').hidden = !(state.tab === 'filing' && $('#unfiled').children.length);
}

function processedCard(p) {
  const el = document.createElement('article');
  el.className = 'card';
  el.dataset.key = p.key;
  el.innerHTML = cardBody(p) + `
    <div class="actions filed-actions">
      ${p.drive_url
        ? `<a class="open" href="${esc(p.drive_url)}" target="_blank" rel="noopener">Open in Drive</a>`
        : ''}
      <button class="verify">Check</button>
      <span class="done">${p.dest_folder_name ? '→ ' + esc(p.dest_folder_name) : 'In Drive'}</span>
      <span class="cardstatus" hidden></span>
    </div>`;
  wireAbstract(el);
  el.querySelector('.verify').addEventListener('click', () => verifyOne(p, el));
  return el;
}

async function verifyOne(paper, card) {
  const button = card.querySelector('.verify');
  button.disabled = true;
  cardStatus(card, 'Checking Drive…');
  try {
    const r = await api(`/api/papers/${encodeURIComponent(paper.key)}/verify`, {
      method: 'POST'
    });
    showCounts(r.counts);
    if (r.present) {
      cardStatus(card, r.detail);
      button.disabled = false;
    } else {
      // It has moved to Filing, so both lists changed.
      showNotice(`${paper.title.slice(0, 44)}: ${r.detail}`);
      loadProcessed();
      loadFiling();
    }
  } catch (e) {
    // A failed check must leave the paper exactly as it was.
    button.disabled = false;
    cardStatus(card, `Could not check: ${e.message}`, {bad: true});
  }
}

async function loadProcessed() {
  try {
    const data = await api('/api/processed');
    showCounts(data.counts);
    $('#processed').replaceChildren(...data.papers.map(processedCard));
    $('#noprocessed').hidden = data.papers.length > 0;
  } catch (e) { showError(`Could not load processed papers: ${e.message}`); }
}

async function loadFiling() {
  try {
    const data = await api('/api/accepted');
    state.base = data.base;
    $('#basefolder').textContent = data.base.folder_name
      ? `Base folder: ${data.base.folder_name}`
      : 'No base folder set';

    // Drop selections for papers that are no longer unfiled.
    const live = new Set(data.unfiled.map(p => p.key));
    for (const k of [...state.selected]) if (!live.has(k)) state.selected.delete(k);

    $('#unfiled').replaceChildren(...data.unfiled.map(p => filingCard(p, {selectable: true})));
    $('#filed').replaceChildren(...data.filed.map(p => filingCard(p, {selectable: false})));
    $('#filed-wrap').hidden = data.filed.length === 0;
    $('#nofiling').hidden = data.unfiled.length + data.filed.length > 0;
    $('#badge-filing').textContent = data.unfiled.length;
    refreshFileBar();
  } catch (e) { showError(`Could not load accepted papers: ${e.message}`); }
}

$('#selall').addEventListener('click', () => {
  const boxes = [...$('#unfiled').querySelectorAll('input[type=checkbox]')];
  const all = boxes.every(b => b.checked);
  boxes.forEach(b => { b.checked = !all; b.dispatchEvent(new Event('change')); });
});

$('#filesel').addEventListener('click', () => {
  if (!state.base?.folder_id) {
    showError('Set a base folder first.');
    return;
  }
  openSheet({mode: 'file', keys: [...state.selected]});
});

$('#setbase').addEventListener('click', () => openSheet({mode: 'base'}));

// ---------- folder picker ----------

async function openSheet(opts) {
  state.sheet = {...opts, parent: opts.mode === 'base' ? 'root' : null};
  $('#sheettitle').textContent = opts.mode === 'base'
    ? 'Choose the base folder'
    : `File ${opts.keys.length} paper${opts.keys.length === 1 ? '' : 's'}`;
  $('#sheetok').textContent = opts.mode === 'base' ? 'Use this folder' : 'File here';
  $('#sheet').hidden = false;
  await browse(state.sheet.parent);
}

async function browse(parent) {
  try {
    const q = parent ? `?parent=${encodeURIComponent(parent)}` : '';
    const data = await api(`/api/drive/folders${q}`);
    state.sheet.parent = data.parent;

    const crumbs = $('#crumbs');
    crumbs.replaceChildren();
    data.breadcrumb.forEach((c, i) => {
      if (i) crumbs.insertAdjacentHTML('beforeend', '<span class="sep">/</span>');
      if (i === data.breadcrumb.length - 1) {
        crumbs.insertAdjacentHTML('beforeend', `<span class="here">${esc(c.name)}</span>`);
      } else {
        const b = document.createElement('button');
        b.textContent = c.name;
        b.addEventListener('click', () => browse(c.id));
        crumbs.appendChild(b);
      }
    });

    const wrap = $('#folders');
    wrap.replaceChildren();
    if (!data.folders.length) {
      wrap.innerHTML = '<div class="note">No subfolders here. "File here" uses this folder.</div>';
    }
    data.folders.forEach(f => {
      const b = document.createElement('button');
      b.className = 'folder';
      b.innerHTML = `<span>${esc(f.name)}</span><span class="chev">›</span>`;
      b.addEventListener('click', () => browse(f.id));
      wrap.appendChild(b);
    });
  } catch (e) {
    $('#folders').innerHTML = `<div class="note">${esc(e.message)}</div>`;
  }
}

$('#sheetcancel').addEventListener('click', () => { $('#sheet').hidden = true; state.sheet = null; });

$('#sheetnew').addEventListener('click', async () => {
  const name = prompt('New folder name');
  if (!name || !name.trim()) return;
  try {
    const f = await api('/api/drive/folders', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name.trim(), parent_id: state.sheet.parent})
    });
    await browse(f.id);
  } catch (e) { showError(`Could not create folder: ${e.message}`); }
});

$('#sheetok').addEventListener('click', async () => {
  const here = $('#crumbs .here')?.textContent || 'folder';
  const {mode, keys, parent} = state.sheet;
  try {
    if (mode === 'base') {
      await api('/api/settings/base-folder', {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({folder_id: parent, folder_name: here})
      });
    } else {
      await api('/api/destination', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keys, folder_id: parent, folder_name: here})
      });
      state.selected.clear();
    }
    $('#sheet').hidden = true;
    state.sheet = null;
    loadFiling();
  } catch (e) { showError(e.message); }
});

// ---------- tabs ----------

function selectTab(tab) {
  state.tab = tab;
  for (const name of ['triage', 'filing', 'processed']) {
    $(`#tab-${name}`).setAttribute('aria-selected', tab === name);
    $(`#view-${name}`).hidden = tab !== name;
  }
  $('#undo').hidden = tab !== 'triage' || !state.lastUndo;
  refreshFileBar();
  if (tab === 'filing') loadFiling();
  if (tab === 'processed') loadProcessed();
}

$('#tab-triage').addEventListener('click', () => selectTab('triage'));
$('#tab-filing').addEventListener('click', () => selectTab('filing'));
$('#tab-processed').addEventListener('click', () => selectTab('processed'));

// ---------- sign-in ----------

async function loadAuth() {
  try {
    const s = await api('/api/auth/status');
    const bar = $('#authbar');
    bar.hidden = false;
    bar.classList.toggle('ok', s.signed_in);
    bar.classList.toggle('warn', !s.redirect_ok || !s.has_client_secrets);
    $('#signout').hidden = !s.signed_in;

    if (s.needs_reauth) {
      // Signed in, but the grant is too narrow. Only a fresh consent widens
      // it, so offer the button again rather than reporting success.
      bar.classList.remove('ok');
      bar.classList.add('warn');
      $('#authmsg').textContent = s.has_gmail
        ? 'Signed in, but missing some permissions — sign in again'
        : 'Signed in for Drive only. Sign in again to grant Gmail access, ' +
          'or mail will fall back to IMAP.';
    } else if (s.signed_in) {
      $('#authmsg').textContent = s.valid
        ? 'Signed in to Google'
        : 'Signed in; access will renew automatically';
    } else if (!s.has_client_secrets) {
      $('#authmsg').textContent = 'No credentials.json on the server yet';
    } else if (!s.redirect_ok) {
      // Google refuses plain http from anything but localhost, so signing in
      // from the tablet over a LAN address cannot work. Say so plainly.
      $('#authmsg').textContent = s.redirect_problem;
    } else {
      $('#authmsg').textContent = 'Not signed in';
    }
  } catch (e) {
    $('#authbar').hidden = true;
  }
}

$('#signout').addEventListener('click', async () => {
  try {
    await api('/api/auth/signout', {method: 'POST'});
    loadAuth();
  } catch (e) { showError(e.message); }
});

function noticeSignInReturn() {
  // The callback redirects here with ?signed_in=1. Acknowledge it, then strip
  // the parameter so a reload or a bookmark does not repeat the message.
  const params = new URLSearchParams(location.search);
  if (!params.has('signed_in')) return;
  history.replaceState({}, '', location.pathname);
  showNotice('Signed in to Google');
}

// ---------- manual mail check ----------

const checkBtn = $('#check');
let pollTimer = null;

function setChecking(on) {
  checkBtn.disabled = on;
  checkBtn.querySelector('.spin').hidden = !on;
  checkBtn.querySelector('.label').textContent = on ? 'Checking…' : 'Check now';
}

function describe(r) {
  if (!r) return 'Checked.';
  if (r.error) return `Check failed: ${r.error}`;
  if (!r.messages) return 'No new alert emails.';
  const bits = [`${r.messages} alert email${r.messages === 1 ? '' : 's'}`];
  bits.push(r.new_papers ? `${r.new_papers} new paper${r.new_papers === 1 ? '' : 's'}`
                         : 'nothing new');
  if (r.already_known) bits.push(`${r.already_known} already seen`);
  return bits.join(' · ');
}

async function pollRefresh() {
  try {
    const s = await api('/api/refresh');
    if (s.running) {
      pollTimer = setTimeout(pollRefresh, 1200);
      return;
    }
    setChecking(false);
    const r = s.last;
    if (r && r.error) showError(describe(r));
    else showNotice(describe(r));
    // A warning means mail arrived but enrichment did not finish; the papers
    // are real and worth showing even without abstracts.
    if (r && r.warning) showError(r.warning);
    if (r && r.new_papers) { loadTriage(); loadFiling(); }
    else loadTriage();
  } catch (e) {
    setChecking(false);
    showError(`Could not read check status: ${e.message}`);
  }
}

checkBtn.addEventListener('click', async () => {
  setChecking(true);
  clearTimeout(pollTimer);
  try {
    await api('/api/refresh', {method: 'POST'});
    pollRefresh();
  } catch (e) {
    setChecking(false);
    showError(`Could not start a check: ${e.message}`);
  }
});

// A check may already be running -- started from another device, or left
// running when this page was reloaded.
async function resumeRefreshIfRunning() {
  try {
    const s = await api('/api/refresh');
    if (s.running) { setChecking(true); pollRefresh(); }
  } catch (e) { /* the button still works */ }
}

function showNotice(msg) {
  const el = $('#notice');
  el.textContent = msg;
  el.hidden = false;
  clearTimeout(showNotice.t);
  showNotice.t = setTimeout(() => { el.hidden = true; }, 3500);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
noticeSignInReturn();
checkServerVersion();
resumeRefreshIfRunning();
loadAuth();
loadTriage();
loadFiling();
loadProcessed();
</script>
</body>
</html>
